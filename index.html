        let currentMarkers = [];

        function renderMarkers(minCapacity = 0) {
            currentMarkers.forEach(marker => marker.remove());
            currentMarkers = [];

            let activeCount = 0;
            let totalCapacity = 0;

            let countRock = 0;
            let countClub = 0;
            let countIdol = 0;

            locations.forEach(loc => {
                if (loc.capacity < minCapacity) return;

                activeCount++;
                totalCapacity += loc.capacity;

                let circleSize = 16;
                if (loc.capacity >= 1000) { circleSize = 36; } 
                else if (loc.capacity >= 600) { circleSize = 26; }

                let markerColor = 'rgba(255, 255, 0, 0.45)'; 
                let genreName = 'ロック / J-POP';
                
                if (loc.genre === 'club') {
                    markerColor = 'rgba(147, 51, 234, 0.45)'; 
                    genreName = 'クラブ / テクノ / DJ';
                    countClub++;
                } else if (loc.genre === 'idol') {
                    markerColor = 'rgba(255, 0, 0, 0.45)';  
                    genreName = '地下アイドル / アコースティック';
                    countIdol++;
                } else {
                    countRock++;
                }

                const el = document.createElement('div');
                el.style.width = `${circleSize}px`;
                el.style.height = `${circleSize}px`;
                el.style.backgroundColor = markerColor; 
                el.style.borderRadius = '50%';
                el.style.border = '2px solid rgba(255, 255, 255, 0.7)';
                el.style.cursor = 'pointer';
                

                const isFav = favorites[loc.name] !== undefined;
                const btnText = isFav ? "★ 解除" : "☆ 追加";
                const btnBg = isFav ? "#3f3f46" : "#4f46e5";

                const popup = new maplibregl.Popup({ offset: circleSize / 2 })
                    .setHTML(`
                        <div style="padding: 2px; min-width: 190px; font-family:sans-serif;">
                            <strong style="font-size: 13px; color: #fff; display: block; margin-bottom: 6px; letter-spacing:0.02em;">${loc.name}</strong>
                            <span style="color: #a1a1aa; font-size: 11px; display: block; margin-bottom: 3px;">属性: <strong style="color: #e4e4e7; font-weight:500;">${genreName}</strong></span>
                            <span style="color: #a1a1aa; font-size: 11px; display: block; margin-bottom: 10px;">キャパ: <strong style="color: #e4e4e7; font-weight:500;">${loc.capacity}人</strong></span>
                            <div style="display:flex; gap:10px; align-items:center; border-top: 1px solid rgba(255,255,255,0.08); padding-top: 8px;">
                                <a href="${loc.url}" target="_blank" style="color: #60a5fa; text-decoration: none; font-size: 11px; font-weight: 600;">WEBサイト →</a>
                                <button onclick="toggleFavorite('${escapeHtml(loc.name)}')" style="background:${btnBg}; border:1px solid rgba(255,255,255,0.1); color:white; padding:4px 9px; border-radius:0px; font-size:11px; cursor:pointer; font-weight:600; margin-left:auto; transition:all 0.15s;">${btnText}</button>
                            </div>
                        </div>
                    `);

                const marker = new maplibregl.Marker({ element: el })
                    .setLngLat([loc.lng, loc.lat])
                    .setPopup(popup)
                    .addTo(map);

                currentMarkers.push(marker);
            });

            document.getElementById('stats-count').textContent = activeCount;
            document.getElementById('stats-total').textContent = totalCapacity.toLocaleString();

            document.getElementById('genre-breakdown').innerHTML = `
                <span>🟡 ロック系: <strong style="color:#fff">${countRock}</strong></span>
                <span>🟣 クラブ系: <strong style="color:#fff">${countClub}</strong></span>
                <span>🔴 アイドル系: <strong style="color:#fff">${countIdol}</strong></span>
            `;

            createStationMarker([139.7016, 35.6580], "渋谷駅（基準点）");
            createStationMarker([139.7008, 35.6896], "新宿駅（主要ターミナル駅）");
        }

        function createStationMarker(coords, title) {
            const stationEl = document.createElement('div');
            stationEl.style.width = '20px';
            stationEl.style.height = '20px';
            stationEl.style.backgroundColor = '#007aff';
            stationEl.style.borderRadius = '50%';
            stationEl.style.border = '3px solid #ffffff';
            stationEl.style.boxShadow = '0 0 8px rgba(0,0,0,0.5)';
            stationEl.style.cursor = 'pointer';

            const stationPopup = new maplibregl.Popup({ offset: 10 })
                .setHTML(`<div style="padding: 2px; color: #fff; font-family:sans-serif;"><strong style="font-size: 13px;">${title}</strong></div>`);

            const stationMarker = new maplibregl.Marker({ element: stationEl })
                .setLngLat(coords)
                .setPopup(stationPopup)
                .addTo(map);

            currentMarkers.push(stationMarker);
        }

        window.jumpToArea = function(coords, zoomLevel) {
            map.flyTo({
                center: coords,
                zoom: zoomLevel,
                essential: true,
                speed: 1.2
            });
        };

        window.toggleFavorite = function(name) {
            if (favorites[name] !== undefined) {
                delete favorites[name];
            } else {
                favorites[name] = "";
            }
            
            localStorage.setItem('shibuya_livehouse_favs', JSON.stringify(favorites));
            
            const currentSliderValue = parseInt(document.getElementById('capacity-slider').value);
            renderMarkers(currentSliderValue);
            updateMyListUI();
        };

        window.saveMemo = function(name) {
            const memoText = document.getElementById(`memo-${name}`).value;
            favorites[name] = memoText;
            localStorage.setItem('shibuya_livehouse_favs', JSON.stringify(favorites));
            alert(`セットリスト・メモを更新しました。`);
        };

        function updateMyListUI() {
            const container = document.getElementById('mylist-container');
            const keys = Object.keys(favorites);

            if (keys.length === 0) {
                container.innerHTML = `<p id="empty-message" style="color: #71717a; font-size: 12px; text-align: center; margin-top: 20px; line-height: 1.6;">お気に入りの会場が未登録です。<br>マップ上のピンから追加してください。</p>`;
                return;
            }

            container.innerHTML = ""; 

            keys.forEach(name => {
                const memoValue = favorites[name];
                const itemDiv = document.createElement('div');
                itemDiv.className = 'mylist-item';
                
                itemDiv.innerHTML = `
                    <div class="mylist-title-row">
                        <span class="mylist-name" onclick="flyToLivehouse('${escapeHtml(name)}')">📍 ${name}</span>
                        <button class="remove-fav-btn" onclick="toggleFavorite('${escapeHtml(name)}')">削除</button>
                    </div>
                    <textarea id="memo-${name}" class="memo-area" placeholder="ここにセットリストや当日のタイテ、メモを自由に入力...">${memoValue}</textarea>
                    <div style="text-align: right;">
                        <button class="save-memo-btn" onclick="saveMemo('${escapeHtml(name)}')">保存する</button>
                    </div>
                `;
                container.appendChild(itemDiv);
            });
        }

        window.flyToLivehouse = function(name) {
            const target = locations.find(loc => loc.name === name);
            if (target) {
                map.flyTo({
                    center: [target.lng, target.lat],
                    zoom: 16,
                    essential: true,
                    speed: 1.2
                });
            }
        };

        window.toggleSidePanel = function() {
            const panel = document.getElementById('side-panel');
            panel.classList.toggle('collapsed');
        };

        // 💡 ここから追加：お気に入りを全件削除する機能
        window.clearAllFavorites = function() {
            if (confirm("お気に入りとメモをすべて削除しますか？\n（この操作は取り消せません）")) {
                favorites = {}; // データを空っぽにする
                localStorage.removeItem('shibuya_livehouse_favs'); // ブラウザの保存データを消去
                
                // 地図のピンとリストの見た目を更新
                const currentSliderValue = parseInt(document.getElementById('capacity-slider').value);
                renderMarkers(currentSliderValue);
                updateMyListUI();
            }
        };
        // 💡 ここまで追加

        function escapeHtml(str) {
            return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#039;');
        }
        
        renderMarkers(0);
        updateMyListUI();

        const switcher = document.querySelectorAll('.layer-switcher input');
        switcher.forEach(input => {
            input.addEventListener('change', (e) => {
                map.setStyle(mapStyles[e.target.value]);
                map.once('style.load', () => {
                    const currentSliderValue = parseInt(document.getElementById('capacity-slider').value);
                    renderMarkers(currentSliderValue);
                });
            });
        });

        const slider = document.getElementById('capacity-slider');
        const sliderVal = document.getElementById('capacity-value');
        slider.addEventListener('input', (e) => {
            const minCap = parseInt(e.target.value);
            sliderVal.textContent = minCap;
            renderMarkers(minCap);
        });

    </script>
